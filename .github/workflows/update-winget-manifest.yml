name: Update Winget Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.0.226)"
        required: true
      target_repo:
        description: "Target GitHub repo (owner/name)"
        required: false
        default: "microsoft/modernize-cli"

jobs:
  update-winget-manifest:
    runs-on: windows-latest
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (tag: $TAG)"

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Verify GH_TOKEN
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Error "GH_TOKEN secret is not set."
            exit 1
          }
          # Verify token has access to public repos
          $headers = @{ Authorization = "token $env:GH_TOKEN"; 'User-Agent' = 'winget-update' }
          try {
            $resp = Invoke-RestMethod -Uri "https://api.github.com/user" -Headers $headers
            Write-Host "Authenticated as: $($resp.login)"
          } catch {
            Write-Error "Token validation failed: $_"
            exit 1
          }
          # Check token can access winget-pkgs
          try {
            $resp = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/winget-pkgs" -Headers $headers
            Write-Host "Can access winget-pkgs: $($resp.full_name)"
          } catch {
            Write-Error "Cannot access microsoft/winget-pkgs with this token: $_"
            exit 1
          }

      - name: Generate updated winget manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $repo = "${{ inputs.target_repo || 'microsoft/modernize-cli' }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"

          $urls = @(
            "$baseUrl/modernize_${version}_windows_x64.msi",
            "$baseUrl/modernize_${version}_windows_arm64.msi"
          )

          $releaseNotesUrl = "https://github.com/$repo/releases/tag/$tag"

          ./wingetcreate.exe update GitHub.Copilot.modernization.agent `
            --version $version `
            --urls $urls `
            --release-notes-url $releaseNotesUrl `
            --out manifests

          echo "Generated manifests:"
          Get-ChildItem -Recurse -File manifests | ForEach-Object {
            echo "--- $($_.FullName) ---"
            Get-Content $_.FullName
          }

      - name: Submit PR to winget-pkgs
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $manifestDir = (Get-ChildItem -Directory manifests | Select-Object -First 1).FullName
          ./wingetcreate.exe submit --token $env:GH_TOKEN $manifestDir
